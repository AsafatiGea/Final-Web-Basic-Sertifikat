<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Daftar Kunjungan - Discover Nias Island</title>

    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../styles/daftar.css" />
    <link rel="stylesheet" href="../styles/layout.css" />
    <link rel="stylesheet" href="../styles/components.css" />
    <link rel="stylesheet" href="../styles/responsive.css" />
  </head>

  <body>
    
    <nav class="navbar">
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="../src/tentang.html">Tentang</a></li>
        <li><a href="../src/wisata.html">Wisata</a></li>

        <li><a href="../src/galeri.html">Galeri</a></li>
        <li><a href="../src/daftar.html">Daftar</a></li>
      </ul>
    </nav>
    <header>
      <h1>Rencanakan Kunjungan Anda</h1>
      <p class="p1">Isi form untuk informasi lengkap dan penawaran terbaik</p>
    </header>
    
    <section>
      <h2>Informasi Kunjungan</h2>

      <form id="visitForm">
        <label for="nama">Nama Lengkap *</label>
        <input type="text" id="nama" name="nama" required />

        <label for="email">Email *</label>
        <input type="email" id="email" name="email" required />

        <label for="asal">Negara / Kota Asal</label>
        <input type="text" id="asal" name="asal" />

        <label for="tanggal">Tanggal Kunjungan</label>
        <input type="date" id="tanggal" name="tanggal" />

        <label for="jumlah">Jumlah Orang</label>
        <input type="number" id="jumlah" name="jumlah" min="1" value="1" />

        <label for="pesan">Pesan Khusus</label>
        <textarea id="pesan" name="pesan" rows="4"></textarea>

        <button type="submit">Kirim Permintaan Informasi</button>
      </form>

      <div id="successMessage">
        Terima kasih! Informasi kunjungan akan segera dikirim ke email Anda.
      </div>
    </section>

    <footer>
      <p>© 2024 Discover Nias Island</p>
    </footer>
  </body>
</html>
