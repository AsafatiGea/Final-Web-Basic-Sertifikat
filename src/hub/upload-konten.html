<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Konten</title>

  <style>
    body { font-family: Arial; background: #f1f5f9; }
    .container { max-width: 600px; margin: auto; padding: 20px; }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: #0f172a;
      color: white;
      border: none;
      border-radius: 8px;
    }

    .back {
      display: inline-block;
      margin-bottom: 10px;
      text-decoration: none;
    }
  </style>
</head>

<body>
<div class="container">

  <a href="hub.html" class="back">← Kembali</a>

  <div class="card">
    <h2>📤 Upload Konten Nias</h2>

    <input type="text" placeholder="Judul Konten">
    <textarea placeholder="Deskripsi tentang Nias"></textarea>
    <input type="file">

    <button>Upload</button>
  </div>

</div>
</body>
</html>
