<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Profile</title>
  <style>
    body { font-family: Arial; background: #f1f5f9; }
    .container { max-width: 600px; margin: auto; padding: 20px; }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0f172a;
      color: white;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>
<div class="container">

  <div class="card">
    <h2>Edit Profile</h2>

    <input type="text" placeholder="Nama">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password Baru">

    <button>Simpan Perubahan</button>
  </div>

</div>
</body>
</html>
