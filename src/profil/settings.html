<!doctype html>
<html lang="en">
<head>

  <title>Settings</title>
  <style>
    body { font-family: Arial; background: #f1f5f9; }
    .container { max-width: 600px; margin: auto; padding: 20px; }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      margin-top: 10px;
      padding: 10px;
      background: #0f172a;
      color: white;
      text-align: center;
      border-radius: 8px;
      text-decoration: none;
    }

    .danger {
      background: red;
    }
  </style>
</head>

<body>
<div class="container">

  <div class="card">
    <h2>Settings</h2>

    <a href="#" class="btn">Ganti Password</a>
    <a href="#" class="btn">Privasi Akun</a>
    <a href="#" class="btn danger">Logout</a>
  </div>

</div>
</body>
</html>
